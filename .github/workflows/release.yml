name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore NuGet packages
        run: nuget restore PreventSleep.sln -PackagesDirectory packages

      - name: Build Release
        shell: pwsh
        run: |
          $msbuild = Get-ChildItem -Path "C:\Program Files*\Microsoft Visual Studio\*\*\MSBuild\Current\Bin\MSBuild.exe" -Recurse -ErrorAction SilentlyContinue |
            Where-Object { Test-Path (Join-Path $_.DirectoryName "Roslyn\Microsoft.CSharp.Core.targets") } |
            Select-Object -First 1

          if (-not $msbuild) {
            throw "MSBuild with Roslyn targets was not found."
          }

          & $msbuild.FullName PreventSleep.sln /restore /p:Configuration=Release /p:Platform="Any CPU"

      - name: Create release archive
        run: |
          $files = Get-ChildItem -Path "PreventSleep\bin\Release\" -File |
            Where-Object { $_.Extension -notin @('.pdb', '.xml', '.lnk', '.ico') }
          Compress-Archive -Path $files.FullName -DestinationPath PreventSleep-${{ github.ref_name }}.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: PreventSleep-${{ github.ref_name }}.zip
          generate_release_notes: true
